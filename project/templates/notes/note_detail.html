{% extends '../base.html' %}

{% block content %}

<div class="address">
	<a href="{% url 'courses:detail' note.course.id %}">← | {{ note.course.title }} &gt;</a> {{ note.title }} &gt;
</div>

<h1>{{ note.title }}</h1>
<h2>{{ note.desc }}</h2>
<p>{{ content_md|safe }}</p>
<sup>{{ note.created }}</sup>

{% endblock %}
