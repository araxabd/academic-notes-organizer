{% extends '../base.html' %}

{% block content %}


<h1>Are you sure you want to delete note "{{note.title}}" ?</h1>
<form method="POST">
	{% csrf_token %}
	<button type="submit" class="delete">YES</button>
</form>
<div class="extra">
	<a href="{% url 'courses:detail' note.course.id %}">back to the course</a>
</div>

{% endblock %}
