{% extends '../base.html' %}

{% block content %}

<div class="address">
	<a href="{% url 'courses:list' %}">←</a> | Search "{{ searched_phrase }}" &gt;
</div>

{% for note in notes %}
<a href="{% url 'notes:detail' note.id %}" class="note">
	<h5>{{ note.title }}</h5>
	<p>{{ note.desc }}</p>
	<small>Created at: {{ note.created }} | Last update: {{ note.updated }}</small>
</a>
{% empty %}
<h5>No notes!</h5>
{% endfor %}


{% endblock %}
