{% extends '../base.html' %}

{% block content %}
<div class="address">
	<a href="{% url 'courses:list' %}">←</a> | {{ course.title }} &gt;
</div>


<h4>{{ course.desc }}</h4>
<a href="{% url 'notes:create' course.id %}" class="add-note-btn">+ add note</a>
{% for note in notes %}
<a href="{% url 'notes:detail' note.id %}" class="note">
	<h5>{{ note.title }}</h5>
	<p>{{ note.desc }}</p>
	<small>Created at: {{ note.created }} | Last update: {{ note.updated }}</small>
</a>
{% empty %}
<h5>No notes!</h5>
{% endfor %}

{% endblock %}
