{% extends '../base.html' %}
{% block content %}

<a href="{% url 'courses:create' %}" class="add-btn">+ add course</a>

{% for course in courses %}
<div class="course">
	<h2>{{ course.title }}</h2>
	<p>{{ course.desc }}</p>
	<a href="{% url 'courses:detail' course.id %}">Notes of this course</a>
	<small>Created at : {{ course.created }} | Last update: {{ course.updated }}</small>
</div>
{% endfor %}
{% endblock %}
