{% load static %}
<!DOCTYPE html>
<html lang="en-us">
	<head>
		<title>{% block title %}{% endblock %}</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<link rel="stylesheet" href="{% static 'styles.css' %}" />
	</head>
	<body>
		<nav class="navbar">
			<a href="{% url 'marketplace:course_public_list' %}" class="logo">Note Organizer</a>

			<input type="checkbox" id="menu-toggle" />

			<label for="menu-toggle" class="ham">
				<span></span>
				<span></span>
				<span></span>
			</label>
			<ul class="nav-links">
				<li><a href="{% url 'courses:list' %}">Courses List</a></li>
				{% if request.user.is_authenticated %}
				<li><a href="{% url 'users:logout' %}">{{ request.user.get_username }}: Logout</a></li>
				{% else %}
				<li><a href="{% url 'users:login' %}">Login</a></li>
				{% endif %}
			</ul>
		</nav>
		<div class="container">

		<form method="GET" action="{% url 'notes:search' %}" class="searchbar">
			<input type="text" name="q" placeholder="What do you want?..."/>
			<button type="submit">🔍︎ Search</button>
		</form>

		{% block content %}
		{% endblock %}
		</div>
	</body>
</html>
